# ~/.tmux.conf — beginner-friendly config tuned for running Claude Code
# across multiple projects. Every line is commented so you can learn what
# it does and tweak freely. Reload after editing with:  prefix + r
# (or from a shell:  tmux source-file ~/.tmux.conf)

# ----------------------------------------------------------------------
# Colors / display
# ----------------------------------------------------------------------
# Tell programs inside tmux they have a 256-color terminal. "screen-256color"
# is the bulletproof choice on macOS (always present). If you later switch to
# iTerm2 / Ghostty / WezTerm / Kitty you can upgrade this to "tmux-256color"
# plus a true-color override for richer colors.
set -g default-terminal "screen-256color"

# Don't lag when you press Escape (matters a lot inside Claude Code & vim).
set -sg escape-time 10

# Let editors know when the terminal gains/loses focus.
set -g focus-events on

# ----------------------------------------------------------------------
# Quality-of-life
# ----------------------------------------------------------------------
# Turn the mouse on: click to switch panes, drag borders to resize,
# scroll to look back through output, click windows in the status bar.
# This single setting makes tmux feel normal while you're learning.
set -g mouse on

# Keep a big scrollback buffer (default is only 2000 lines).
set -g history-limit 50000

# Let apps inside tmux send escape sequences through to the real terminal.
# Claude Code's fullscreen mode uses this for clipboard copies and
# notifications; harmless for everything else.
set -g allow-passthrough on

# Number windows and panes starting at 1 (easier to reach than 0 on the row).
set -g base-index 1
setw -g pane-base-index 1

# When you close a window, renumber the rest so there are no gaps.
set -g renumber-windows on

# Keep window names you set yourself; don't let programs rename them.
set -g allow-rename off
setw -g automatic-rename off

# ----------------------------------------------------------------------
# Keybindings
# ----------------------------------------------------------------------
# The "prefix" is the key combo you press before any tmux command.
# Default is Ctrl-b. We keep it so every tutorial you read matches.
# (To try Ctrl-a instead someday, uncomment the next 3 lines.)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Split panes with | and - (more intuitive than the default " and %).
# New panes open in the SAME directory as the current one.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also open in the current directory.
bind c new-window -c "#{pane_current_path}"

# Move between panes with prefix + h/j/k/l (vim-style). Arrow keys still work.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload this config without restarting tmux.
bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"

# ----------------------------------------------------------------------
# Copy mode (scrolling back & copying text)
# ----------------------------------------------------------------------
# Use vim-style keys when navigating scrollback (prefix + [ to enter).
setw -g mode-keys vi

# Press v to start selecting, y to copy. On macOS, copy goes straight to the
# system clipboard via pbcopy, and so does releasing a mouse drag-selection.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ----------------------------------------------------------------------
# Status bar (the strip along the bottom)
# ----------------------------------------------------------------------
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"

# Left: session name in a highlighted box.
set -g status-left "#[bg=colour32,fg=colour255,bold] #S #[default] "
set -g status-left-length 30

# Right: date and time.
set -g status-right "#[fg=colour250]%a %b %d  #[bold]%I:%M %p "
set -g status-right-length 40

# Windows: index:name, with the active one highlighted.
setw -g window-status-current-format "#[bg=colour32,fg=colour255,bold] #I:#W "
setw -g window-status-format " #I:#W "
